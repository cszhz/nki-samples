    - {mode: mha, tp: 2, batch: 4,  seq: 8192, label: "mha_tp2_b4_s8k"}
    - {mode: mha, tp: 2, batch: 8,  seq: 4096, label: "mha_tp2_b8_s4k"}
    - {mode: mha, tp: 2, batch: 8,  seq: 8192, label: "mha_tp2_b8_s8k"}
    - {mode: mha, tp: 2, batch: 12, seq: 4096, label: "mha_tp2_b12_s4k"}
    - {mode: mha, tp: 2, batch: 12, seq: 8192, label: "mha_tp2_b12_s8k"}
    - {mode: mha, tp: 2, batch: 16, seq: 4096, label: "mha_tp2_b16_s4k"}
    - {mode: mha, tp: 2, batch: 16, seq: 8192, label: "mha_tp2_b16_s8k"}
    # TP=4
    - {mode: mha, tp: 4, batch: 4,  seq: 4096, label: "mha_tp4_b4_s4k"}
    - {mode: mha, tp: 4, batch: 4,  seq: 8192, label: "mha_tp4_b4_s8k"}
    - {mode: mha, tp: 4, batch: 8,  seq: 4096, label: "mha_tp4_b8_s4k"}
    - {mode: mha, tp: 4, batch: 8,  seq: 8192, label: "mha_tp4_b8_s8k"}
    - {mode: mha, tp: 4, batch: 12, seq: 4096, label: "mha_tp4_b12_s4k"}
    - {mode: mha, tp: 4, batch: 12, seq: 8192, label: "mha_tp4_b12_s8k"}
    - {mode: mha, tp: 4, batch: 16, seq: 4096, label: "mha_tp4_b16_s4k"}
    - {mode: mha, tp: 4, batch: 16, seq: 8192, label: "mha_tp4_b16_s8k"}

  # GQA combinations (3 TP × 4 Batch × 2 Seq = 24 configs)
  gqa_combinations:
    # TP=1
    - {mode: gqa, tp: 1, batch: 4,  seq: 4096, label: "gqa_tp1_b4_s4k"}
    - {mode: gqa, tp: 1, batch: 4,  seq: 8192, label: "gqa_tp1_b4_s8k"}
    - {mode: gqa, tp: 1, batch: 8,  seq: 4096, label: "gqa_tp1_b8_s4k"}
    - {mode: gqa, tp: 1, batch: 8,  seq: 8192, label: "gqa_tp1_b8_s8k"}
    - {mode: gqa, tp: 1, batch: 12, seq: 4096, label: "gqa_tp1_b12_s4k"}
    - {mode: gqa, tp: 1, batch: 12, seq: 8192, label: "gqa_tp1_b12_s8k"}
    - {mode: gqa, tp: 1, batch: 16, seq: 4096, label: "gqa_tp1_b16_s4k"}
    - {mode: gqa, tp: 1, batch: 16, seq: 8192, label: "gqa_tp1_b16_s8k"}
    # TP=2
    - {mode: gqa, tp: 2, batch: 4,  seq: 4096, label: "gqa_tp2_b4_s4k"}
    - {mode: gqa, tp: 2, batch: 4,  seq: 8192, label: "gqa_tp2_b4_s8k"}

    - {mode: gqa, tp: 4, batch: 16, seq: 8192, label: "gqa_tp4_b16_s8k"}

  # MQA combinations (3 TP × 4 Batch × 2 Seq = 24 configs)
  mqa_combinations:
    # TP=1
    - {mode: mqa, tp: 1, batch: 4,  seq: 4096, label: "mqa_tp1_b4_s4k"}
    - {mode: mqa, tp: 1, batch: 4,  seq: 8192, label: "mqa_tp1_b4_s8k"}
